<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>두루 · 세상공부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --bg:#f5f4ef;
    --surface:#ffffff;
    --ink:#23282c;
    --sub:#6c7278;
    --faint:#9aa0a4;
    --line:#e6e4dc;
    --line-soft:#efeee8;
    --shadow:0 1px 2px rgba(40,40,30,.04),0 6px 20px rgba(40,40,30,.05);
    /* 분야색 */
    --f-int:#2d6a9f;   /* 국제 */
    --f-eco:#2f8f6b;   /* 경제 */
    --f-sci:#6b5ba6;   /* 과학 */
    --f-soc:#b5654a;   /* 사회 */
    --f-hum:#b0892e;   /* 인문 */
    --f-free:#7a8088;  /* 정리·자유 */
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,system-ui,"Segoe UI",Roboto,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:var(--bg);
    color:var(--ink);
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 18px 110px}

  /* 헤더 */
  header{padding:26px 2px 14px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand h1{font-size:25px;letter-spacing:-.5px;margin:0;font-weight:800}
  .brand .tag{font-size:12.5px;color:var(--faint);letter-spacing:.2px}
  .demo-banner{
    display:none;margin-top:14px;padding:10px 13px;border-radius:11px;
    background:#fff8e8;border:1px solid #f0e2bd;color:#8a6d24;font-size:12.5px;line-height:1.5
  }

  /* 오늘 분야 히어로 */
  .hero{
    margin-top:8px;background:var(--surface);border:1px solid var(--line);
    border-radius:16px;padding:18px 18px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden
  }
  .hero::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent,#999)}
  .hero .date{font-size:13px;color:var(--sub);letter-spacing:.3px}
  .hero .field{display:flex;align-items:center;gap:9px;margin-top:3px}
  .hero .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);flex:none}
  .hero .field b{font-size:21px;font-weight:800;letter-spacing:-.4px}
  .hero .field span{font-size:13px;color:var(--faint);font-weight:600}
  .hero .blurb{margin-top:9px;font-size:13.5px;color:var(--sub);line-height:1.55}

  /* 주간 진도 */
  .week{display:flex;gap:7px;margin-top:14px}
  .week .d{flex:1;text-align:center}
  .week .d .lab{font-size:11px;color:var(--faint);margin-bottom:5px}
  .week .d .pip{
    height:7px;border-radius:4px;background:var(--line);transition:background .2s
  }
  .week .d.done .pip{background:var(--pipc,#9aa0a4)}
  .week .d.today .lab{color:var(--ink);font-weight:800}

  /* 섹션 카드 */
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:16px;
    padding:16px 16px 14px;margin-top:14px;box-shadow:var(--shadow)
  }
  .card-h{display:flex;align-items:center;gap:9px;margin-bottom:3px}
  .card-h .ic{font-size:16px}
  .card-h h2{font-size:15.5px;margin:0;font-weight:800;letter-spacing:-.3px}
  .card-h .mins{margin-left:auto;font-size:11.5px;color:var(--faint);font-weight:600;
    background:var(--bg);padding:2px 8px;border-radius:20px;border:1px solid var(--line-soft)}
  .card-sub{font-size:12.5px;color:var(--sub);margin:0 0 11px}

  .links{display:flex;flex-direction:column;gap:8px}
  .lk{
    display:flex;align-items:center;gap:11px;padding:11px 12px;border:1px solid var(--line);
    border-radius:12px;text-decoration:none;color:var(--ink);background:#fcfcfa;transition:.15s
  }
  .lk:active{transform:scale(.99)}
  .lk:hover{border-color:#d6d3c8;background:#fff}
  .lk .nm{font-size:14px;font-weight:700}
  .lk .ds{font-size:12px;color:var(--faint);margin-top:1px}
  .lk .go{margin-left:auto;color:var(--faint);font-size:13px;flex:none}
  .lk .lico{width:30px;height:30px;border-radius:8px;flex:none;display:flex;align-items:center;
    justify-content:center;font-size:14px;font-weight:800;color:#fff;background:var(--accent)}

  /* 완료 체크 */
  .done-row{display:flex;align-items:center;gap:9px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line-soft)}
  .chk{
    width:21px;height:21px;border-radius:6px;border:2px solid var(--line);background:#fff;
    flex:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s
  }
  .chk.on{background:var(--accent);border-color:var(--accent)}
  .chk svg{width:12px;height:12px;opacity:0;transition:.15s}
  .chk.on svg{opacity:1}
  .done-row label{font-size:13px;color:var(--sub);cursor:pointer;user-select:none}
  .done-row.on label{color:var(--ink);font-weight:700}

  /* 기록 */
  .rec textarea,.rec input{
    width:100%;border:1px solid var(--line);border-radius:11px;padding:11px 12px;font:inherit;
    font-size:14px;color:var(--ink);background:#fcfcfa;resize:vertical;margin-top:8px
  }
  .rec textarea:focus,.rec input:focus{outline:none;border-color:var(--accent);background:#fff}
  .rec .flab{font-size:12.5px;color:var(--sub);font-weight:700;margin-top:12px;display:block}
  .rec .flab:first-of-type{margin-top:4px}
  .save{
    margin-top:14px;width:100%;border:none;border-radius:12px;padding:13px;font:inherit;
    font-size:14.5px;font-weight:800;color:#fff;background:var(--accent);cursor:pointer;transition:.15s
  }
  .save:active{transform:scale(.99)}
  .save.saved{background:#3c8d4f}
  .saved-note{text-align:center;font-size:12px;color:var(--faint);margin-top:9px;min-height:16px}

  /* 보관함 */
  .arch-tools{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
  .arch-tools input{flex:1;min-width:140px;border:1px solid var(--line);border-radius:11px;
    padding:10px 12px;font:inherit;font-size:13.5px;background:var(--surface)}
  .arch-tools input:focus{outline:none;border-color:var(--ink)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:11px}
  .chip{font-size:12px;padding:6px 12px;border-radius:20px;border:1px solid var(--line);
    background:var(--surface);color:var(--sub);cursor:pointer;font-weight:600}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .entry{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:14px 15px;
    margin-top:11px;box-shadow:var(--shadow);position:relative}
  .entry::before{content:"";position:absolute;left:0;top:13px;bottom:13px;width:3px;border-radius:3px;background:var(--ec,#999)}
  .entry .eh{display:flex;align-items:center;gap:8px;margin-bottom:7px;padding-left:6px}
  .entry .eh .ed{font-size:12.5px;color:var(--faint);font-weight:600}
  .entry .eh .ef{font-size:11.5px;font-weight:800;color:var(--ec);background:var(--bg);
    padding:2px 9px;border-radius:20px}
  .entry .es{font-size:13.5px;color:var(--ink);white-space:pre-wrap;padding-left:6px}
  .entry .et{font-size:12.5px;color:var(--sub);margin-top:8px;padding-left:6px}
  .entry .et b{color:var(--ec);font-weight:700}
  .empty{text-align:center;color:var(--faint);font-size:13.5px;padding:40px 10px;line-height:1.7}

  /* 탭바 */
  .tabbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);
    backdrop-filter:blur(10px);border-top:1px solid var(--line);display:flex;z-index:20}
  .tabbar .inner{max-width:680px;margin:0 auto;width:100%;display:flex}
  .tabbar button{flex:1;border:none;background:none;padding:11px 0 14px;font:inherit;
    color:var(--faint);font-size:11.5px;font-weight:700;cursor:pointer;display:flex;
    flex-direction:column;align-items:center;gap:3px}
  .tabbar button .ti{font-size:19px;line-height:1}
  .tabbar button.on{color:var(--ink)}
  .page{display:none}
  .page.on{display:block;animation:fade .25s}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .sec-title{font-size:13px;font-weight:800;color:var(--sub);letter-spacing:.2px;margin:22px 2px 2px;text-transform:none}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><h1>두루</h1><span class="tag">넓게 보는 하루</span></div>
    <div class="demo-banner" id="demoBanner">
      🔆 <b>미리보기 모드</b> — Firebase 설정 전이라 기록이 저장되지 않아요. 아래 안내대로 설정을 넣으면 폰·노트북에서 기록이 동기화됩니다.
    </div>
  </header>

  <!-- 오늘 -->
  <div class="page on" id="pageToday">
    <div class="hero" id="hero">
      <div class="date" id="heroDate">—</div>
      <div class="field"><span class="dot"></span><b id="heroField">—</b><span id="heroDay"></span></div>
      <div class="blurb" id="heroBlurb"></div>
      <div class="week" id="weekStrip"></div>
    </div>

    <div id="sections"></div>

    <div class="card rec">
      <div class="card-h"><span class="ic">✍️</span><h2>오늘 기록</h2></div>
      <p class="card-sub">오늘 배운 걸 짧게 남겨두면 보관함에 쌓여요.</p>
      <label class="flab">세 줄 요약</label>
      <textarea id="recSummary" rows="3" placeholder="오늘 알게 된 것, 인상 깊었던 것을 짧게…"></textarea>
      <label class="flab">새로 안 용어</label>
      <input id="recTerms" type="text" placeholder="예: 기준금리 — 한국은행이 정하는 기준이 되는 금리" />
      <button class="save" id="saveBtn">기록 저장</button>
      <div class="saved-note" id="savedNote"></div>
    </div>
  </div>

  <!-- 보관함 -->
  <div class="page" id="pageArchive">
    <div class="sec-title">보관함</div>
    <div class="card" style="margin-top:8px">
      <div class="arch-tools">
        <input id="searchBox" type="text" placeholder="요약·용어 검색…" />
      </div>
      <div class="chips" id="fieldChips"></div>
    </div>
    <div id="archiveList"></div>
  </div>
</div>

<nav class="tabbar">
  <div class="inner">
    <button class="on" id="tabToday" onclick="switchTab('today')"><span class="ti">📖</span>오늘</button>
    <button id="tabArchive" onclick="switchTab('archive')"><span class="ti">🗂️</span>보관함</button>
  </div>
</nav>

<script>
/* ===========================================================
   ① Firebase 설정 — 노트북에서 배포할 때 여기만 채우면 됩니다.
   콘솔(console.firebase.google.com) → 프로젝트 설정 → 내 앱(웹)
   에 있는 firebaseConfig 값을 그대로 붙여넣으세요.
   비워두면 '미리보기 모드'로 작동합니다(저장 안 됨).
   =========================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyCXuuAGtluAbobsdcKTd9Es-XIdOr5Om30",
  authDomain: "dooroo-88598.firebaseapp.com",
  projectId: "dooroo-88598",
  storageBucket: "dooroo-88598.firebasestorage.app",
  messagingSenderId: "759145745290",
  appId: "1:759145745290:web:1cacf2202163563f0bd673"
};
/* =========================================================== */

/* ② 콘텐츠 — 검증된 공식 진입점. 안 바뀌는 메인 주소 위주라 잘 안 깨집니다. */
const COMMON_SKIM = [
  {nm:"빅카인즈", ds:"여러 신문을 한 번에 비교", url:"https://www.bigkinds.or.kr", ic:"빅"},
  {nm:"네이버 뉴스", ds:"오늘의 주요 뉴스 한눈에", url:"https://news.naver.com", ic:"N"},
  {nm:"뉴닉", ds:"쉽게 풀어주는 시사 뉴스레터", url:"https://newneek.co", ic:"뉴"}
];

const FIELDS = {
  1:{key:"int", name:"국제 · 세계", accent:"var(--f-int)", color:"#2d6a9f",
     blurb:"세계가 지금 어떻게 돌아가는지. 한 사건을 우리 시각과 바깥 시각으로 같이 봐요.",
     deep:[
       {nm:"BBC 코리아", ds:"한국어로 보는 국제뉴스", url:"https://www.bbc.com/korean"},
       {nm:"연합뉴스 국제", ds:"국내 통신사의 국제면", url:"https://www.yna.co.kr"}
     ],
     talk:[{nm:"TED", ds:"세계 각 분야 강연", url:"https://www.ted.com"}]},
  2:{key:"eco", name:"경제 (입문)", accent:"var(--f-eco)", color:"#2f8f6b",
     blurb:"금리·환율 같은 기본 개념부터 천천히. 모르던 분야를 입문자 눈높이로 알아가요.",
     deep:[
       {nm:"어피티", ds:"경제 입문 뉴스레터", url:"https://uppity.co.kr"},
       {nm:"한국은행", ds:"경제용어·쉬운 경제설명", url:"https://www.bok.or.kr"}
     ],
     talk:[{nm:"세바시 강연", ds:"쉽게 듣는 교양 강연", url:"https://www.sebasi.co.kr"}]},
  3:{key:"sci", name:"과학 · 기술", accent:"var(--f-sci)", color:"#6b5ba6",
     blurb:"세상을 움직이는 과학과 기술. 어려운 내용을 대중 눈높이로 풀어주는 곳들이에요.",
     deep:[
       {nm:"동아사이언스", ds:"과학뉴스를 쉽게", url:"https://www.dongascience.com"}
     ],
     talk:[{nm:"카오스재단 강연", ds:"과학 대중강연 모음", url:"https://www.youtube.com/results?search_query=%EC%B9%B4%EC%98%A4%EC%8A%A4%EC%9E%AC%EB%8B%A8+%EA%B0%95%EC%97%B0"}]},
  4:{key:"soc", name:"사회 · 정책", accent:"var(--f-soc)", color:"#b5654a",
     blurb:"우리 사회의 이슈 하나를 골라 여러 신문이 어떻게 다루는지 비교해 봐요.",
     deep:[
       {nm:"빅카인즈 이슈", ds:"한 이슈, 여러 시각 비교", url:"https://www.bigkinds.or.kr"}
     ],
     talk:[{nm:"세바시 강연", ds:"삶·사회 이야기 강연", url:"https://www.sebasi.co.kr"}]},
  5:{key:"hum", name:"문화 · 인문", accent:"var(--f-hum)", color:"#b0892e",
     blurb:"역사·철학·예술 같은 넓은 교양. 깊이 있는 강연으로 한 주를 마무리해요.",
     deep:[
       {nm:"네이버 열린연단", ds:"무료 인문학 석학 강연", url:"https://search.naver.com/search.naver?query=%EB%84%A4%EC%9D%B4%EB%B2%84+%EC%97%B4%EB%A6%B0%EC%97%B0%EB%8B%A8"}
     ],
     talk:[{nm:"EBS", ds:"교양·다큐 다시보기", url:"https://www.ebs.co.kr"}]},
  0:{key:"free", name:"정리 · 자유", accent:"var(--f-free)", color:"#7a8088",
     blurb:"한 주 동안 쌓인 기록을 돌아보고, 관심 가는 주제 하나를 자유롭게 깊이 파보는 날.",
     deep:[
       {nm:"K-MOOC", ds:"무료 대학강의 — 한 분야 깊이", url:"https://www.kmooc.kr"},
       {nm:"보관함 돌아보기", ds:"이번 주 기록 다시 보기", url:"#archive"}
     ],
     talk:[{nm:"TED", ds:"관심 주제 자유롭게", url:"https://www.ted.com"}]},
  6:{key:"free", name:"정리 · 자유", accent:"var(--f-free)", color:"#7a8088",
     blurb:"한 주 동안 쌓인 기록을 돌아보고, 관심 가는 주제 하나를 자유롭게 깊이 파보는 날.",
     deep:[
       {nm:"K-MOOC", ds:"무료 대학강의 — 한 분야 깊이", url:"https://www.kmooc.kr"},
       {nm:"보관함 돌아보기", ds:"이번 주 기록 다시 보기", url:"#archive"}
     ],
     talk:[{nm:"TED", ds:"관심 주제 자유롭게", url:"https://www.ted.com"}]}
};
const DAYNAMES = ["일","월","화","수","목","금","토"];

/* ③ 저장 레이어 — Firebase 있으면 Firestore, 없으면 메모리(미리보기) */
const usingFB = !!firebaseConfig.apiKey;
let fb = null, mem = {};
async function initStore(){
  if(!usingFB){ document.getElementById('demoBanner').style.display='block'; return; }
  const app = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const fs  = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
  const a = app.initializeApp(firebaseConfig);
  fb = {db:fs.getFirestore(a), ...fs};
}
async function loadAll(){
  if(!usingFB) return Object.values(mem);
  const snap = await fb.getDocs(fb.collection(fb.db,"study_records"));
  const out=[]; snap.forEach(d=>out.push(d.data())); return out;
}
async function loadOne(date){
  if(!usingFB) return mem[date]||null;
  const ref = fb.doc(fb.db,"study_records",date);
  const s = await fb.getDoc(ref); return s.exists()? s.data():null;
}
async function saveOne(rec){
  if(!usingFB){ mem[rec.date]=rec; return; }
  await fb.setDoc(fb.doc(fb.db,"study_records",rec.date), rec);
}

/* ④ 날짜 유틸 */
function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
const today = new Date();
const todayStr = ymd(today);
const dow = today.getDay();
const F = FIELDS[dow];

/* ⑤ 오늘 화면 렌더 */
function setAccent(el,color){el.style.setProperty('--accent',color);}
function linkRow(item,accent){
  const ext = !item.url.startsWith("#");
  const initial = item.ic || item.nm.slice(0,1);
  return `<a class="lk" href="${item.url}" ${ext?'target="_blank" rel="noopener"':'onclick="switchTab(\'archive\');return false;"'} style="--accent:${accent}">
    <span class="lico">${initial}</span>
    <span><span class="nm">${item.nm}</span><span class="ds">${item.ds||''}</span></span>
    <span class="go">${ext?'↗':'→'}</span></a>`;
}
let curTasks = {skim:false,deep:false,talk:false};

function renderToday(){
  const hero = document.getElementById('hero');
  setAccent(hero,F.color);
  document.documentElement.style.setProperty('--accent',F.color);
  const mo = today.getMonth()+1, da = today.getDate();
  document.getElementById('heroDate').textContent = `${today.getFullYear()}년 ${mo}월 ${da}일`;
  document.getElementById('heroField').textContent = F.name;
  document.getElementById('heroDay').textContent = `· ${DAYNAMES[dow]}요일`;
  document.getElementById('heroBlurb').textContent = F.blurb;

  const blocks = [
    {ic:"📰",title:"훑기",mins:"10분",sub:"여러 곳을 빠르게 — 내 알고리즘 밖 소식까지.",items:COMMON_SKIM,key:"skim"},
    {ic:"🔍",title:"깊이보기",mins:"20~30분",sub:"오늘 분야에서 한 편만 골라 끝까지.",items:F.deep,key:"deep"},
    {ic:"🎧",title:"강연",mins:"15분",sub:"오늘 분야와 닿는 강연 한 편.",items:F.talk,key:"talk"}
  ];
  let html="";
  blocks.forEach(b=>{
    html+=`<div class="card">
      <div class="card-h"><span class="ic">${b.ic}</span><h2>${b.title}</h2><span class="mins">${b.mins}</span></div>
      <p class="card-sub">${b.sub}</p>
      <div class="links">${b.items.map(it=>linkRow(it,F.color)).join("")}</div>
      <div class="done-row" data-k="${b.key}" onclick="toggleTask('${b.key}')">
        <div class="chk"><svg viewBox="0 0 12 12"><path d="M2 6l3 3 5-6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <label>${b.title} 완료</label>
      </div>
    </div>`;
  });
  document.getElementById('sections').innerHTML = html;
}

function toggleTask(k){
  curTasks[k]=!curTasks[k];
  const row=document.querySelector(`.done-row[data-k="${k}"]`);
  row.classList.toggle('on',curTasks[k]);
  row.querySelector('.chk').classList.toggle('on',curTasks[k]);
  persist(false);
}

/* ⑥ 주간 진도 */
async function renderWeek(){
  const strip=document.getElementById('weekStrip');
  const all=await loadAll();
  const map={}; all.forEach(r=>map[r.date]=r);
  // 이번 주 월요일 시작
  const base=new Date(today); const offset=(dow+6)%7; base.setDate(base.getDate()-offset);
  let html="";
  for(let i=0;i<7;i++){
    const d=new Date(base); d.setDate(base.getDate()+i);
    const ds=ymd(d); const wd=d.getDay(); const fc=FIELDS[wd].color;
    const r=map[ds];
    const done = r && (r.summary?.trim() || (r.tasks&&(r.tasks.skim||r.tasks.deep||r.tasks.talk)));
    const isToday = ds===todayStr;
    html+=`<div class="d ${done?'done':''} ${isToday?'today':''}" style="--pipc:${fc}">
      <div class="lab">${DAYNAMES[wd]}</div><div class="pip"></div></div>`;
  }
  strip.innerHTML=html;
}

/* ⑦ 기록 저장 */
async function persist(showNote){
  const rec={
    date:todayStr, field:F.name, fieldKey:F.key, color:F.color,
    summary:document.getElementById('recSummary').value,
    terms:document.getElementById('recTerms').value,
    tasks:{...curTasks}, savedAt:Date.now()
  };
  await saveOne(rec);
  if(showNote){
    const b=document.getElementById('saveBtn'); const n=document.getElementById('savedNote');
    b.classList.add('saved'); b.textContent="저장됨 ✓";
    n.textContent = usingFB? "기록이 저장되었어요." : "미리보기라 이 세션에서만 보관돼요.";
    setTimeout(()=>{b.classList.remove('saved');b.textContent="기록 저장";},1600);
  }
  renderWeek();
}
document.getElementById('saveBtn').onclick=()=>persist(true);

async function restoreToday(){
  const r=await loadOne(todayStr);
  if(!r) return;
  document.getElementById('recSummary').value=r.summary||"";
  document.getElementById('recTerms').value=r.terms||"";
  if(r.tasks){
    curTasks={...curTasks,...r.tasks};
    ["skim","deep","talk"].forEach(k=>{
      const row=document.querySelector(`.done-row[data-k="${k}"]`);
      if(row&&curTasks[k]){row.classList.add('on');row.querySelector('.chk').classList.add('on');}
    });
  }
}

/* ⑧ 보관함 */
let archFilter="all", archSearch="";
function renderChips(){
  const defs=[["all","전체"],["int","국제"],["eco","경제"],["sci","과학"],["soc","사회"],["hum","인문"],["free","자유"]];
  document.getElementById('fieldChips').innerHTML=defs.map(([k,l])=>
    `<span class="chip ${archFilter===k?'on':''}" onclick="setFilter('${k}')">${l}</span>`).join("");
}
function setFilter(k){archFilter=k;renderChips();renderArchive();}
document.getElementById('searchBox').oninput=e=>{archSearch=e.target.value.trim();renderArchive();};

async function renderArchive(){
  const list=document.getElementById('archiveList');
  let all=await loadAll();
  all=all.filter(r=>r.summary?.trim()||r.terms?.trim());
  all.sort((a,b)=>b.date.localeCompare(a.date));
  if(archFilter!=="all") all=all.filter(r=>r.fieldKey===archFilter);
  if(archSearch){const q=archSearch.toLowerCase();
    all=all.filter(r=>(r.summary||"").toLowerCase().includes(q)||(r.terms||"").toLowerCase().includes(q));}
  if(all.length===0){
    list.innerHTML=`<div class="empty">아직 기록이 없어요.<br>오늘 공부를 마치고 첫 기록을 남겨보세요.</div>`;return;
  }
  list.innerHTML=all.map(r=>{
    const c=r.color||"#7a8088";
    const [y,m,d]=r.date.split("-");
    const terms=r.terms?.trim()?`<div class="et"><b>용어</b> ${r.terms}</div>`:"";
    return `<div class="entry" style="--ec:${c}">
      <div class="eh"><span class="ed">${y}.${m}.${d}</span><span class="ef">${r.field||''}</span></div>
      <div class="es">${(r.summary||'').replace(/</g,'&lt;')||'<span style=\"color:#aaa\">요약 없음</span>'}</div>
      ${terms}</div>`;
  }).join("");
}

/* ⑨ 탭 */
function switchTab(t){
  const today=t==='today';
  document.getElementById('pageToday').classList.toggle('on',today);
  document.getElementById('pageArchive').classList.toggle('on',!today);
  document.getElementById('tabToday').classList.toggle('on',today);
  document.getElementById('tabArchive').classList.toggle('on',!today);
  if(!today) renderArchive();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ⑩ 시작 */
(async function(){
  renderToday();
  renderChips();
  try{ await initStore(); }catch(e){ console.warn("store init:",e); document.getElementById('demoBanner').style.display='block'; }
  await restoreToday();
  await renderWeek();
})();
</script>
